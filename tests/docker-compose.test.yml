services:
  redis:
    image: redis:8.6.0
    ports:
      - "6399:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 1s
      timeout: 3s
      retries: 10

  elasticsearch:
    image: docker.elastic.co/elasticsearch/elasticsearch:8.10.2
    environment:
      ELASTIC_PASSWORD: "passwd"
      discovery.type: "single-node"
      xpack.security.enabled: "false"
    ports:
      - "9201:9200"
    healthcheck:
      test: ["CMD-SHELL", "curl -s http://localhost:9200/_cluster/health | grep -q '\"status\"'"]
      interval: 2s
      timeout: 5s
      retries: 30
    deploy:
      resources:
        limits:
          memory: 2Gb
