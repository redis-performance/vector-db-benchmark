services:
  redis:
    image: redis:8.6.0
    ports:
      - "6399:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 1s
      timeout: 3s
      retries: 10

  pgvector:
    image: pgvector/pgvector:pg16
    environment:
      POSTGRES_PASSWORD: "passwd"
    ports:
      - "5433:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 2s
      timeout: 5s
      retries: 15

  qdrant:
    image: qdrant/qdrant:v1.13.4
    ports:
      - "6334:6333"
      - "6335:6334"
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:6333/collections || exit 1"]
      interval: 2s
      timeout: 5s
      retries: 15

  elasticsearch:
    image: docker.elastic.co/elasticsearch/elasticsearch:8.10.2
    environment:
      ELASTIC_PASSWORD: "passwd"
      discovery.type: "single-node"
      xpack.security.enabled: "false"
    ports:
      - "9201:9200"
    healthcheck:
      test: ["CMD-SHELL", "curl -s http://localhost:9200/_cluster/health | grep -q '\"status\"'"]
      interval: 2s
      timeout: 5s
      retries: 30
    deploy:
      resources:
        limits:
          memory: 2Gb

  opensearch:
    image: opensearchproject/opensearch:2.19.2
    environment:
      discovery.type: "single-node"
      plugins.security.disabled: "true"
      OPENSEARCH_INITIAL_ADMIN_PASSWORD: "Admin_1234!"
    ports:
      - "9202:9200"
    healthcheck:
      test: ["CMD-SHELL", "curl -s http://localhost:9200/_cluster/health | grep -q '\"status\"'"]
      interval: 2s
      timeout: 5s
      retries: 30
    deploy:
      resources:
        limits:
          memory: 2Gb
